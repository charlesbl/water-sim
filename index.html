<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TerraGPU - 2.5D Fluid Simulation (From Dust Inspired)</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Sleek Glassmorphic HUD -->
    <div id="hud" class="glass-panel">
      <header>
        <h1>TERRA<span>GPU</span></h1>
        <p class="subtitle">2.5D GPU Fluid Simulation</p>
      </header>

      <!-- Section: Brushes -->
      <section class="hud-section">
        <button class="hud-section-header">
          <h2><span>🖌️</span> Interactive Brush</h2>
          <span class="chevron">▼</span>
        </button>
        <div class="hud-section-content">
          <div class="hud-section-content-inner">
            <div class="brush-grid">
              <button class="btn-brush active" data-brush="0" title="Add water">
                <span class="icon">🌊</span> Water
              </button>
              <button class="btn-brush" data-brush="1" title="Add lava">
                <span class="icon">🌋</span> Lava
              </button>
              <button class="btn-brush" data-brush="2" title="Add sand">
                <span class="icon">⏳</span> Sand
              </button>
              <button class="btn-brush" data-brush="3" title="Raise terrain">
                <span class="icon">⛰️</span> Raise
              </button>
              <button class="btn-brush" data-brush="4" title="Dig terrain">
                <span class="icon">🕳️</span> Dig
              </button>
              <button class="btn-brush" data-brush="5" title="Erase water and lava">
                <span class="icon">🧹</span> Erase
              </button>
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="brush-radius">Brush Size</label>
                <span id="brush-radius-val" class="value-display">15</span>
              </div>
              <input type="range" id="brush-radius" min="2" max="200" value="15" step="1" />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="brush-strength">Strength</label>
                <span id="brush-strength-val" class="value-display">1.0</span>
              </div>
              <input type="range" id="brush-strength" min="0.1" max="2.0" value="1.0" step="0.05" />
            </div>
          </div>
        </div>
      </section>

      <!-- Section: Terrain Generation -->
      <section class="hud-section collapsed">
        <button class="hud-section-header">
          <h2><span>⛰️</span> Terrain Generation</h2>
          <span class="chevron">▼</span>
        </button>
        <div class="hud-section-content">
          <div class="hud-section-content-inner">
            <div class="control-group">
              <div class="label-row">
                <label for="terrain-generation">Generation Type</label>
              </div>
              <select id="terrain-generation" class="select-input">
                <option value="realistic" selected>Realistic</option>
                <option value="flat">Flat</option>
              </select>
            </div>

            <div class="control-group" id="flat-rock-height-group">
              <div class="label-row">
                <label for="flat-rock-height">Rock Height</label>
                <span id="flat-rock-height-val" class="value-display">0.05</span>
              </div>
              <input
                type="range"
                id="flat-rock-height"
                min="0.0"
                max="0.5"
                value="0.05"
                step="0.01"
              />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="terrain-sand-height">Sand Height</label>
                <span id="terrain-sand-height-val" class="value-display">0.05</span>
              </div>
              <input
                type="range"
                id="terrain-sand-height"
                min="0.0"
                max="0.5"
                value="0.05"
                step="0.01"
              />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="terrain-tilt">Tilt</label>
                <span id="terrain-tilt-val" class="value-display">0.0</span>
              </div>
              <input type="range" id="terrain-tilt" min="-5.0" max="5.0" value="0.0" step="0.1" />
            </div>

            <div id="terrain-noise-settings">
              <div class="control-group">
                <div class="label-row">
                  <label for="terrain-scale">Scale (Zoom)</label>
                  <span id="terrain-scale-val" class="value-display">4.0</span>
                </div>
                <input
                  type="range"
                  id="terrain-scale"
                  min="1.0"
                  max="10.0"
                  value="4.0"
                  step="0.1"
                />
              </div>

              <div class="control-group">
                <div class="label-row">
                  <label for="terrain-sharpness">Sharpness / Relief</label>
                  <span id="terrain-sharpness-val" class="value-display">1.4</span>
                </div>
                <input
                  type="range"
                  id="terrain-sharpness"
                  min="0.5"
                  max="3.0"
                  value="1.4"
                  step="0.05"
                />
              </div>

              <div class="control-group">
                <div class="label-row">
                  <label for="fbm-octaves">Details (Octaves)</label>
                  <span id="fbm-octaves-val" class="value-display">4</span>
                </div>
                <input type="range" id="fbm-octaves" min="1" max="8" value="4" step="1" />
              </div>

              <div class="control-group">
                <div class="label-row">
                  <label for="fbm-persistence">Persistence</label>
                  <span id="fbm-persistence-val" class="value-display">0.44</span>
                </div>
                <input
                  type="range"
                  id="fbm-persistence"
                  min="0.10"
                  max="0.90"
                  value="0.44"
                  step="0.01"
                />
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section: Fluid Physics -->
      <section class="hud-section collapsed">
        <button class="hud-section-header">
          <h2><span>💧</span> Fluid Behavior</h2>
          <span class="chevron">▼</span>
        </button>
        <div class="hud-section-content">
          <div class="hud-section-content-inner">
            <div class="control-group">
              <div class="label-row">
                <label for="sim-speed">Simulation Speed (ticks/frame)</label>
                <span id="sim-speed-val" class="value-display">1.0</span>
              </div>
              <input type="range" id="sim-speed" min="0.1" max="10.0" value="1.0" step="0.1" />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="water-gravity">Water Gravity (Waves)</label>
                <span id="water-gravity-val" class="value-display">9.81</span>
              </div>
              <input type="range" id="water-gravity" min="1.0" max="25.0" value="9.81" step="0.1" />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="water-damping">Water Friction</label>
                <span id="water-damping-val" class="value-display">0.998</span>
              </div>
              <input
                type="range"
                id="water-damping"
                min="0.90"
                max="1.0"
                value="0.998"
                step="0.001"
              />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="evaporation">Water Evaporation</label>
                <span id="evaporation-val" class="value-display">0.000000</span>
              </div>
              <input
                type="range"
                id="evaporation"
                min="0.0"
                max="0.00003"
                value="0.0"
                step="0.000001"
              />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="lava-gravity">Lava Gravity</label>
                <span id="lava-gravity-val" class="value-display">6.0</span>
              </div>
              <input type="range" id="lava-gravity" min="0.1" max="25.0" value="6.0" step="0.1" />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="lava-damping">Lava Friction</label>
                <span id="lava-damping-val" class="value-display">0.950</span>
              </div>
              <input
                type="range"
                id="lava-damping"
                min="0.50"
                max="1.0"
                value="0.95"
                step="0.001"
              />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="border-behavior">Border Behavior</label>
              </div>
              <select id="border-behavior" class="select-input">
                <option value="0">Block all</option>
                <option value="1" selected>Pass all</option>
                <option value="2">Pass water but not sand</option>
              </select>
            </div>

            <div class="control-group" id="border-water-height-group">
              <div class="label-row">
                <label for="border-water-height">Border Water Height</label>
                <span id="border-water-height-val" class="value-display">0.00</span>
              </div>
              <input
                type="range"
                id="border-water-height"
                min="0.0"
                max="3.0"
                value="0.0"
                step="0.05"
              />
            </div>
          </div>
        </div>
      </section>

      <!-- Section: Sediment & Erosion -->
      <section class="hud-section collapsed">
        <button class="hud-section-header">
          <h2><span>⏳</span> Hydrology & Sand</h2>
          <span class="chevron">▼</span>
        </button>
        <div class="hud-section-content">
          <div class="hud-section-content-inner">
            <div class="control-group">
              <div class="label-row">
                <label for="erosion-rate">Erosion Rate</label>
                <span id="erosion-rate-val" class="value-display">0.005</span>
              </div>
              <input
                type="range"
                id="erosion-rate"
                min="0.0"
                max="0.1"
                value="0.005"
                step="0.001"
              />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="capacity-factor">Carrying Capacity</label>
                <span id="capacity-factor-val" class="value-display">0.400</span>
              </div>
              <input
                type="range"
                id="capacity-factor"
                min="0.0"
                max="0.5"
                value="0.4"
                step="0.005"
              />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="deposition-rate">Deposition Rate</label>
                <span id="deposition-rate-val" class="value-display">0.05</span>
              </div>
              <input
                type="range"
                id="deposition-rate"
                min="0.0"
                max="1.0"
                value="0.05"
                step="0.01"
              />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="min-water-depth">Min Water Depth for Transport</label>
                <span id="min-water-depth-val" class="value-display">0.00</span>
              </div>
              <input
                type="range"
                id="min-water-depth"
                min="0.0"
                max="0.5"
                value="0.0"
                step="0.01"
              />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="sand-slide">Sand Sliding Rate</label>
                <span id="sand-slide-val" class="value-display">0.05</span>
              </div>
              <input type="range" id="sand-slide" min="0.01" max="0.2" value="0.05" step="0.01" />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="sand-static-repose-slope">Angle of Repose (Static)</label>
                <span id="sand-static-repose-slope-val" class="value-display">0.0030</span>
              </div>
              <input
                type="range"
                id="sand-static-repose-slope"
                min="0.0"
                max="0.04"
                value="0.003"
                step="0.0005"
              />
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="sand-dynamic-repose-slope">Angle of Repose (Dynamic)</label>
                <span id="sand-dynamic-repose-slope-val" class="value-display">0.0015</span>
              </div>
              <input
                type="range"
                id="sand-dynamic-repose-slope"
                min="0.0"
                max="0.04"
                value="0.0015"
                step="0.0005"
              />
            </div>
          </div>
        </div>
      </section>

      <!-- Section: Climate & Weather -->
      <section class="hud-section collapsed">
        <button class="hud-section-header">
          <h2><span>⛈️</span> Climate & Weather</h2>
          <span class="chevron">▼</span>
        </button>
        <div class="hud-section-content">
          <div class="hud-section-content-inner">
            <div class="checkbox-row">
              <input type="checkbox" id="rain-active" />
              <label for="rain-active">⛈️ Enable Rain</label>
            </div>
            <div class="control-group" style="margin-top: 12px">
              <div class="label-row">
                <label for="rain-quantity">Raindrop Quantity</label>
                <span id="rain-quantity-val" class="value-display">0.0005</span>
              </div>
              <input
                type="range"
                id="rain-quantity"
                min="0.0001"
                max="0.0010"
                value="0.0005"
                step="0.0001"
              />
            </div>
            <div class="control-group">
              <div class="label-row">
                <label for="rain-size">Raindrop Size</label>
                <span id="rain-size-val" class="value-display">0.005</span>
              </div>
              <input
                type="range"
                id="rain-size"
                min="0.001"
                max="0.010"
                value="0.005"
                step="0.001"
              />
            </div>
          </div>
        </div>
      </section>

      <!-- Section: Aesthetics -->
      <section class="hud-section collapsed">
        <button class="hud-section-header">
          <h2><span>🖥️</span> Display & Rendering</h2>
          <span class="chevron">▼</span>
        </button>
        <div class="hud-section-content">
          <div class="hud-section-content-inner">
            <div class="control-group">
              <div class="label-row">
                <label>Layers to Display</label>
              </div>
              <div class="checkbox-row" style="margin-bottom: 6px">
                <input type="checkbox" id="chk-show-rock" checked />
                <label for="chk-show-rock">⛰️ Rock</label>
              </div>
              <div class="checkbox-row" style="margin-bottom: 6px">
                <input type="checkbox" id="chk-show-sand" checked />
                <label for="chk-show-sand">⏳ Sand on ground</label>
              </div>
              <div class="checkbox-row" style="margin-bottom: 6px">
                <input type="checkbox" id="chk-show-water" checked />
                <label for="chk-show-water">🌊 Water</label>
              </div>
              <div class="checkbox-row" style="margin-bottom: 6px">
                <input type="checkbox" id="chk-show-lava" checked />
                <label for="chk-show-lava">🌋 Lava</label>
              </div>
              <div class="checkbox-row">
                <input type="checkbox" id="chk-show-suspended" checked />
                <label for="chk-show-suspended">🟫 Suspended sand (mud)</label>
              </div>
            </div>

            <div class="control-group">
              <div class="label-row">
                <label for="render-resolution">Mesh Resolution</label>
                <span id="render-resolution-val" class="value-display">0.5</span>
              </div>
              <input
                type="range"
                id="render-resolution"
                min="0.05"
                max="1.0"
                value="0.5"
                step="0.05"
              />
            </div>

            <div class="checkbox-row">
              <input type="checkbox" id="auto-rotate" />
              <label for="auto-rotate">Auto Rotate Camera</label>
            </div>

            <div class="checkbox-row">
              <input type="checkbox" id="smooth-rendering" />
              <label for="smooth-rendering">Smooth Rendering</label>
            </div>
          </div>
        </div>
      </section>

      <!-- Section: Controls -->
      <section class="hud-section">
        <div class="btn-row">
          <button id="btn-pause" class="btn-action">⏸️ Pause</button>
          <button id="btn-clear" class="btn-action danger">🧹 Clear Fluids</button>
          <button id="btn-reset" class="btn-action danger">⛰️ Reset Terrain</button>
          <button id="btn-new-terrain" class="btn-action danger">🏔️ New Terrain</button>
        </div>
      </section>

      <!-- Performance Info -->
      <footer id="perf-display">FPS: <span id="fps-val">60</span> | Grid: 256x256</footer>
    </div>

    <!-- Script entry point -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
